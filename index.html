<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YAMAZEN — Global Network</title>

    <!--
  YAMAZEN Global Network — LP 埋め込みコンポーネント（地球儀のみ / rich minimal）

  [使い方]
  A) iframe 埋め込み:
     <iframe src="globe.html" style="width:1440px;height:810px;border:0;" loading="lazy"></iframe>

  B) インライン埋め込み:
     <section class="yg-root">…</section> + <style> + <script> を貼り付け。
     親要素に高さ指定が必要。CSS は `yg-` 接頭辞でスコープ化。
-->

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #3a6ba0;
        -webkit-text-size-adjust: 100%;
      }

      .yg-root {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100dvh;
        overflow: hidden;
        touch-action: none;
        background: linear-gradient(
          to bottom,
          #eef2f6 0%,
          #c4d4e2 28%,
          #7ea1bf 60%,
          #4a78a8 85%,
          #2f5e90 100%
        );
      }
      .yg-root *,
      .yg-root *::before,
      .yg-root *::after {
        box-sizing: border-box;
      }
      .yg-canvas {
        position: absolute;
        inset: 0;
        cursor: grab;
      }
      .yg-canvas:active {
        cursor: grabbing;
      }
      .yg-canvas canvas {
        display: block;
        width: 100% !important;
        height: 100% !important;
      }
    </style>
  </head>
  <body>
    <section class="yg-root" id="yg-root">
      <div class="yg-canvas" id="yg-canvas"></div>
    </section>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "three/addons/controls/OrbitControls.js";

      const mount = document.getElementById("yg-canvas");

      // ═════════════════════════════════════════════════════════════════════
      // Device profile — drive all quality knobs from one place so the mobile
      // path stays snappy on iOS Safari without hurting desktop fidelity.
      // ═════════════════════════════════════════════════════════════════════
      const IS_MOBILE =
        /iPhone|iPad|iPod|Android/i.test(navigator.userAgent) ||
        (window.matchMedia && window.matchMedia("(pointer: coarse)").matches);

      const CFG = IS_MOBILE
        ? {
            dprCap: 1.5,
            fibN: 42000, // half the land-dot density
            tintSegs: 56, // sphere tessellation for tint & inner
            innerSegs: 48,
            rimSegs: 32,
            texW: 1024, // tint texture size
            texH: 512,
            tintNeighborhood: false, // skip 9-tap sampling in tint shader
            arcMax: 7,
            arcSpawnMin: 0.35,
            arcSpawnRand: 0.7,
            landPx: 2.4, // land point size (CSS px)
            officePx: 12,
            officePulsePx: 5,
            antialias: false, // MSAA is a big fill cost on mobile GPUs
            targetFps: 45, // cap rAF to save battery on idle phones
          }
        : {
            dprCap: 2,
            fibN: 95000,
            tintSegs: 96,
            innerSegs: 96,
            rimSegs: 64,
            texW: 2048,
            texH: 1024,
            tintNeighborhood: true,
            arcMax: 14,
            arcSpawnMin: 0.22,
            arcSpawnRand: 0.45,
            landPx: 2.7,
            officePx: 14,
            officePulsePx: 6,
            antialias: true,
            targetFps: 60,
          };

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
      camera.position.set(0, 0, 3.3);

      const renderer = new THREE.WebGLRenderer({
        antialias: CFG.antialias,
        alpha: true,
        powerPreference: IS_MOBILE ? "low-power" : "default",
      });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, CFG.dprCap));
      renderer.setClearColor(0x000000, 0);
      mount.appendChild(renderer.domElement);

      const pointsMats = [];

      function resize() {
        const w = mount.clientWidth,
          h = mount.clientHeight;
        renderer.setSize(w, h, false);
        camera.aspect = w / h;
        // 縦長画面（スマホ縦持ち）でも地球が小さくなりすぎないよう
        // カメラ距離をアスペクト比に応じて調整。横幅基準で fit するイメージ。
        const baseZ = 3.3;
        const fitZ = camera.aspect < 1 ? baseZ / camera.aspect : baseZ;
        // 過度に引きすぎないようクランプ（最大 5.6）
        camera.position.z = Math.min(5.6, Math.max(baseZ, fitZ * 0.95));
        camera.updateProjectionMatrix();
        const dpr = Math.min(window.devicePixelRatio, CFG.dprCap);
        for (const m of pointsMats) {
          if (m.uniforms && m.uniforms.uPixelRatio)
            m.uniforms.uPixelRatio.value = dpr;
        }
      }
      resize();
      new ResizeObserver(resize).observe(mount);

      const globeGroup = new THREE.Group();
      globeGroup.rotation.z = 0.408; // ~23.4° axial tilt
      globeGroup.rotation.y = 2.05; // start near Japan
      scene.add(globeGroup);

      const R = 1;

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enablePan = false;
      controls.enableZoom = false;
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.rotateSpeed = 0.55;
      let userInteracting = false;
      controls.addEventListener("start", () => {
        userInteracting = true;
      });
      controls.addEventListener("end", () => {
        userInteracting = false;
      });

      function latLngToVec3(lat, lng, radius = R) {
        const p = ((90 - lat) * Math.PI) / 180;
        const t = ((lng + 180) * Math.PI) / 180;
        return new THREE.Vector3(
          -radius * Math.sin(p) * Math.cos(t),
          radius * Math.cos(p),
          radius * Math.sin(p) * Math.sin(t),
        );
      }

      // ═════════════════════════════════════════════════════════════════════
      // Shared facing-based alpha snippet — back side is dimmer but visible
      // ═════════════════════════════════════════════════════════════════════
      const FACING_VS = `
  vec3 worldPos = (modelMatrix * vec4(position, 1.0)).xyz;
  vec3 center   = (modelMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;
  vec3 nrm      = normalize(worldPos - center);
  vec3 viewDir  = normalize(cameraPosition - worldPos);
  vFacing = dot(nrm, viewDir);
`;

      // ═════════════════════════════════════════════════════════════════════
      // Inner tinted globe — gives the dots a darker front-facing backdrop
      // so white continents read clearly. Fades to transparent at the rim
      // for the see-through-to-back feel.
      // ═════════════════════════════════════════════════════════════════════
      function buildInnerGlobe() {
        const geo = new THREE.SphereGeometry(
          R * 0.995,
          CFG.innerSegs,
          CFG.innerSegs,
        );
        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          vertexShader: `
            varying float vF;
            void main() {
              vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
              vec3 c  = (modelMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;
              vec3 n  = normalize(wp - c);
              vec3 vd = normalize(cameraPosition - wp);
              vF = dot(n, vd);
              gl_Position = projectionMatrix * viewMatrix * vec4(wp, 1.0);
            }
          `,
          fragmentShader: `
            varying float vF;
            void main() {
              // center of visible hemisphere is darker, rim fades out
              float center = smoothstep(0.05, 0.85, vF);
              float a = center * 0.38;
              // soft gradient tint — upper-left lighter, lower-right darker
              // (approximate via facing)
              vec3 col = mix(vec3(0.36, 0.50, 0.68), vec3(0.18, 0.32, 0.52), center);
              gl_FragColor = vec4(col, a);
            }
          `,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = 1;
        globeGroup.add(mesh);
      }

      // ═════════════════════════════════════════════════════════════════════
      // Land tint sphere — maps the topology image as a texture and paints land
      // pixels with a very soft pale tint. Provides a gentle "painted continent"
      // beneath the dots so landmass shapes read clearly even in low density.
      // ═════════════════════════════════════════════════════════════════════
      function buildLandTintSphere(sharedCanvas) {
        const W = sharedCanvas.width,
          H = sharedCanvas.height;
        const tex = new THREE.CanvasTexture(sharedCanvas);
        tex.wrapS = THREE.RepeatWrapping;
        tex.minFilter = THREE.LinearFilter;
        tex.magFilter = THREE.LinearFilter;
        tex.needsUpdate = true;

        const geo = new THREE.SphereGeometry(
          R * 0.998,
          CFG.tintSegs,
          CFG.tintSegs,
        );
        // Mobile shader: skip the 9-tap neighborhood loop — big fill-rate win
        // on iOS GPUs. Desktop keeps the 3×3 max for crisper small-island edges.
        const fragShader = CFG.tintNeighborhood
          ? `
            uniform sampler2D uTex;
            uniform vec2 uTexel;
            varying vec2 vUv;
            varying float vF;
            float brightness(vec2 uv) {
              vec3 t = texture2D(uTex, uv).rgb;
              return (t.r + t.g + t.b) / 3.0;
            }
            void main() {
              // earth-water.png: black=land, white=water. We want LAND, so take
              // the MIN brightness across the 3×3 neighborhood (= darkest =
              // most-land), then invert to get a 0..1 land mask.
              float m = 1.0;
              for (int dy = -1; dy <= 1; dy++) {
                for (int dx = -1; dx <= 1; dx++) {
                  float b = brightness(vUv + vec2(float(dx), float(dy)) * uTexel);
                  m = min(m, b);
                }
              }
              float land = smoothstep(0.6, 0.4, m);
              float front = smoothstep(-0.1, 0.45, vF);
              vec3 col = vec3(0.94, 0.96, 1.0);
              float a = land * 0.11 * mix(0.35, 1.0, front);
              if (a < 0.006) discard;
              gl_FragColor = vec4(col, a);
            }
          `
          : `
            uniform sampler2D uTex;
            varying vec2 vUv;
            varying float vF;
            void main() {
              vec3 t = texture2D(uTex, vUv).rgb;
              float br = (t.r + t.g + t.b) / 3.0;
              // earth-water.png: black=land. Invert brightness to get land mask.
              float land = smoothstep(0.6, 0.4, br);
              float front = smoothstep(-0.1, 0.45, vF);
              vec3 col = vec3(0.94, 0.96, 1.0);
              float a = land * 0.11 * mix(0.35, 1.0, front);
              if (a < 0.006) discard;
              gl_FragColor = vec4(col, a);
            }
          `;
        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          uniforms: {
            uTex: { value: tex },
            uTexel: { value: new THREE.Vector2(1 / W, 1 / H) },
          },
          vertexShader: `
            varying vec2 vUv;
            varying float vF;
            void main() {
              vUv = uv;
              vec3 wp = (modelMatrix * vec4(position, 1.0)).xyz;
              vec3 c  = (modelMatrix * vec4(0.0, 0.0, 0.0, 1.0)).xyz;
              vec3 n  = normalize(wp - c);
              vec3 vd = normalize(cameraPosition - wp);
              vF = dot(n, vd);
              gl_Position = projectionMatrix * viewMatrix * vec4(wp, 1.0);
            }
          `,
          fragmentShader: fragShader,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = 1.2;
        globeGroup.add(mesh);
      }

      // ═════════════════════════════════════════════════════════════════════
      // Lat/Long wireframe — thin white lines, dimmer on back
      // ═════════════════════════════════════════════════════════════════════
      function buildWireframe() {
        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          depthTest: false,
          vertexShader: `
      varying float vFacing;
      void main() {
        ${FACING_VS}
        vFacing = dot(nrm, viewDir);
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
      }
    `,
          fragmentShader: `
      varying float vFacing;
      void main() {
        float front = smoothstep(-0.35, 0.45, vFacing);
        float a = mix(0.09, 0.32, front);
        gl_FragColor = vec4(1.0, 1.0, 1.0, a);
      }
    `,
        });

        const group = new THREE.Group();
        const radius = R * 1.004;
        const segs = 140;

        // Latitude parallels every 15°
        for (let lat = -75; lat <= 75; lat += 15) {
          const pts = [];
          const latRad = (lat * Math.PI) / 180;
          const rr = Math.cos(latRad) * radius;
          const yy = Math.sin(latRad) * radius;
          for (let i = 0; i <= segs; i++) {
            const a = (i / segs) * Math.PI * 2;
            pts.push(new THREE.Vector3(Math.cos(a) * rr, yy, Math.sin(a) * rr));
          }
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          group.add(new THREE.Line(geo, mat));
        }
        // Longitude meridians every 30°
        for (let lng = 0; lng < 360; lng += 30) {
          const pts = [];
          const lngRad = (lng * Math.PI) / 180;
          for (let i = 0; i <= segs; i++) {
            const a = (i / segs) * Math.PI - Math.PI / 2;
            const rr = Math.cos(a) * radius;
            const yy = Math.sin(a) * radius;
            pts.push(
              new THREE.Vector3(
                Math.cos(lngRad) * rr,
                yy,
                Math.sin(lngRad) * rr,
              ),
            );
          }
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          group.add(new THREE.Line(geo, mat));
        }

        group.renderOrder = 1;
        globeGroup.add(group);
      }

      // ═════════════════════════════════════════════════════════════════════
      // Land dots — Points with soft circle + facing-based alpha
      // ═════════════════════════════════════════════════════════════════════
      // Create once, shared between dot sampling and tint sphere texture.
      function createLandMaskCanvas(image) {
        const W = CFG.texW,
          H = CFG.texH;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        canvas.getContext("2d").drawImage(image, 0, 0, W, H);
        return canvas;
      }

      function sampleLandPositions(sharedCanvas) {
        const W = sharedCanvas.width,
          H = sharedCanvas.height;
        const data = sharedCanvas
          .getContext("2d")
          .getImageData(0, 0, W, H).data;

        const brightnessAt = (px, py) => {
          px = ((px % W) + W) % W;
          py = Math.max(0, Math.min(H - 1, py));
          const idx = (py * W + px) * 4;
          return (data[idx] + data[idx + 1] + data[idx + 2]) / 3;
        };
        // earth-water.png: black=land. Use the MIN of the 3×3 neighborhood so
        // that even a single dark pixel under the sample point counts as land
        // (catches coastlines, small islands).
        const minBrightness3x3 = (px, py) => {
          let m = 255;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              const b = brightnessAt(px + dx, py + dy);
              if (b < m) m = b;
            }
          }
          return m;
        };

        const positions = [];
        const N = CFG.fibN,
          phi = (1 + Math.sqrt(5)) / 2;
        for (let i = 0; i < N; i++) {
          const t = (i + 0.5) / N;
          const inc = Math.acos(1 - 2 * t);
          const az = (2 * Math.PI * i) / phi;
          const x = Math.sin(inc) * Math.cos(az);
          const y = Math.cos(inc);
          const z = Math.sin(inc) * Math.sin(az);
          // Texture UV must match Three.js SphereGeometry defaults so dots line
          // up with the tint sphere. SphereGeometry uses u = phi/(2π), v = θ/π
          // with phi = atan2(z, -x). Compute u/v directly without round-tripping
          // through lng (the lng path was off by 180° from latLngToVec3's
          // t = (lng+180)π/180 convention).
          let u = Math.atan2(z, -x) / (2 * Math.PI);
          if (u < 0) u += 1;
          const v = inc / Math.PI;
          const px = Math.floor(u * W) % W;
          const py = Math.min(H - 1, Math.floor(v * H));
          const b = minBrightness3x3(px, py);
          // earth-water.png is binary-ish (black=land, white=water). 130 is well
          // above the small antialiased halo at coastlines but well below water
          // pixels (~255), so coastlines and tiny islands still register as land.
          if (b < 130) positions.push(x * 1.002, y * 1.002, z * 1.002);
        }
        return positions;
      }

      function buildLandPoints(positions) {
        const geo = new THREE.BufferGeometry();
        geo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3),
        );

        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          depthTest: false,
          uniforms: { uPixelRatio: { value: Math.min(devicePixelRatio, 2) } },
          vertexShader: `
      uniform float uPixelRatio;
      varying float vFacing;
      void main() {
        ${FACING_VS}
        gl_PointSize = ${CFG.landPx.toFixed(2)} * uPixelRatio;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
      }
    `,
          fragmentShader: `
      varying float vFacing;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float circle = smoothstep(0.5, 0.12, d);
        // Sharper front/back separation — back is a faint hint, front is crisp
        float front = smoothstep(-0.05, 0.3, vFacing);
        float a = circle * mix(0.12, 1.0, front);
        if (a < 0.01) discard;
        gl_FragColor = vec4(1.0, 1.0, 1.0, a);
      }
    `,
        });
        pointsMats.push(mat);

        const pts = new THREE.Points(geo, mat);
        pts.renderOrder = 2;
        globeGroup.add(pts);
      }

      // ═════════════════════════════════════════════════════════════════════
      // YAMAZEN global network — auto-generated from
      // https://www.yamazen.co.jp/about/network/ (2026-05-02).
      // Japan: 56 sites (one per physical building)
      // Overseas: 59 cities across 13 countries
      // ═════════════════════════════════════════════════════════════════════
      const officesLatLng = [
        // ── Japan ──
        { lat: 31.5968, lng: 130.5572 }, // 鹿児島県鹿児島市東郡元町11-9
        { lat: 31.9076, lng: 131.4204 }, // 宮崎県宮崎市神宮西2-78-1
        { lat: 32.7502, lng: 129.8781 }, // 長崎県長崎市家野町13-14
        { lat: 32.8034, lng: 130.7083 }, // 熊本県熊本市南区江越2-14-45
        { lat: 33.2394, lng: 131.6097 }, // 大分県大分市新栄町15-15
        { lat: 33.5899, lng: 130.4018 }, // 福岡県福岡市博多区東比恵2-20-18
        { lat: 33.8395, lng: 132.7654 }, // 愛媛県松山市三番町7-6-10
        { lat: 33.883, lng: 130.8749 }, // 福岡県北九州市小倉北区片野新町2-11-3
        { lat: 34.0517, lng: 131.5629 }, // 山口県防府市佐波2-4-7
        { lat: 34.3426, lng: 134.0465 }, // 香川県高松市六条町714
        { lat: 34.3917, lng: 132.4518 }, // 広島県広島市西区中広町1-18-33
        { lat: 34.4857, lng: 133.3623 }, // 広島県福山市春日町1-19-16
        { lat: 34.5737, lng: 135.4829 }, // 大阪府堺市堺区宿院町西1-1-3 ISE伊勢住宅 宿院町西7801 4F
        { lat: 34.6554, lng: 133.9195 }, // 岡山県岡山市北区下中野701-103
        { lat: 34.6786, lng: 135.4914 }, // 大阪府大阪市西区立売堀2-3-16
        { lat: 34.679, lng: 135.4896 }, // 大阪府大阪市西区立売堀3-2-5
        { lat: 34.6791, lng: 135.4886 }, // 大阪府大阪市西区立売堀3-3-21 山善第3ビル（津波避難ビル）
        { lat: 34.6822, lng: 135.4887 }, // 大阪府大阪市西区阿波座2-2-18
        { lat: 34.6826, lng: 135.4937 }, // 大阪府大阪市西区西本町2-3-10 西本町インテス13階
        { lat: 34.6932, lng: 135.1944 }, // 兵庫県神戸市中央区相生町1-2-1
        { lat: 34.711, lng: 137.7259 }, // 静岡県浜松市中央区丸塚町159
        { lat: 34.7325, lng: 135.4998 }, // 大阪府大阪市淀川区宮原3-5-24 新大阪第一生命ビルディング 13階
        { lat: 34.8154, lng: 134.6855 }, // 兵庫県姫路市飾磨区中野田2-34
        { lat: 34.9549, lng: 137.1728 }, // 愛知県岡崎市薮田2-1-7
        { lat: 34.963, lng: 136.6302 }, // 三重県四日市市東日野2-5-12
        { lat: 34.9752, lng: 138.3832 }, // 静岡県静岡市駿河区南町19-9
        { lat: 35.0116, lng: 135.7681 }, // 京都府京都市伏見区竹田浄菩提院町308
        { lat: 35.0132, lng: 135.9599 }, // 滋賀県草津市野村1-21-7
        { lat: 35.1851, lng: 136.8998 }, // 愛知県名古屋市熱田区白鳥2-10-10
        { lat: 35.3066, lng: 136.9341 }, // 愛知県小牧市元町1-39
        { lat: 35.4231, lng: 136.7628 }, // 岐阜県岐阜市茜部大川2-25-1
        { lat: 35.4276, lng: 133.3315 }, // 鳥取県米子市皆生新田3-2-42

      const officePositions = [];
      let officeMat = null;

      function buildOffices() {
        const positions = [];
        const phases = [];
        for (const o of officesLatLng) {
          const p = latLngToVec3(o.lat, o.lng, R * 1.014);
          positions.push(p.x, p.y, p.z);
          phases.push(Math.random() * Math.PI * 2);
          officePositions.push(p);
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute(
          "position",
          new THREE.Float32BufferAttribute(positions, 3),
        );
        geo.setAttribute("phase", new THREE.Float32BufferAttribute(phases, 1));

        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          depthTest: false,
          blending: THREE.NormalBlending,
          uniforms: {
            uTime: { value: 0 },
            uPixelRatio: { value: Math.min(devicePixelRatio, 2) },
          },
          vertexShader: `
      attribute float phase;
      uniform float uTime;
      uniform float uPixelRatio;
      varying float vFacing;
      varying float vPulse;
      void main() {
        ${FACING_VS}
        float pulse = 0.72 + 0.28 * sin(uTime * 1.5 + phase);
        vPulse = pulse;
        gl_PointSize = (${CFG.officePx.toFixed(2)} + ${CFG.officePulsePx.toFixed(2)} * pulse) * uPixelRatio;
        gl_Position = projectionMatrix * viewMatrix * vec4(worldPos, 1.0);
      }
    `,
          fragmentShader: `
      varying float vFacing;
      varying float vPulse;
      void main() {
        vec2 uv = gl_PointCoord - 0.5;
        float d = length(uv);
        float core = smoothstep(0.28, 0.10, d);
        float halo = smoothstep(0.5, 0.0, d) * 0.55;
        float front = smoothstep(-0.18, 0.4, vFacing);
        float a = (core + halo * vPulse) * mix(0.28, 1.0, front);
        if (a < 0.01) discard;
        vec3 col = mix(vec3(0.10, 0.25, 0.50), vec3(0.30, 0.55, 0.90), vPulse);
        gl_FragColor = vec4(col, a);
      }
    `,
        });
        pointsMats.push(mat);
        officeMat = mat;

        const pts = new THREE.Points(geo, mat);
        pts.renderOrder = 3;
        globeGroup.add(pts);
      }

      // ═════════════════════════════════════════════════════════════════════
      // Network arcs — random connection lines
      // ═════════════════════════════════════════════════════════════════════
      class Arc {
        constructor(pA, pB) {
          const dist = pA.distanceTo(pB);
          const lift = 1.0 + 0.06 + dist * 0.22;
          const mid = pA
            .clone()
            .add(pB)
            .multiplyScalar(0.5)
            .normalize()
            .multiplyScalar(lift);
          const curve = new THREE.QuadraticBezierCurve3(
            pA.clone().multiplyScalar(1.016),
            mid,
            pB.clone().multiplyScalar(1.016),
          );
          const segs = 64;
          const pts = curve.getPoints(segs);
          const geo = new THREE.BufferGeometry().setFromPoints(pts);
          geo.setDrawRange(0, 0);
          this.count = segs + 1;
          const mat = new THREE.LineBasicMaterial({
            color: 0xeaf2fb,
            transparent: true,
            opacity: 0,
            depthWrite: false,
            depthTest: false,
            blending: THREE.AdditiveBlending,
          });
          this.line = new THREE.Line(geo, mat);
          this.line.renderOrder = 4;
          this.life = 0;
          this.total = 3.8;

          // endpoint glow (small flash where arc terminates)
          const endGeo = new THREE.BufferGeometry();
          endGeo.setAttribute(
            "position",
            new THREE.Float32BufferAttribute(
              [
                pA.x * 1.017,
                pA.y * 1.017,
                pA.z * 1.017,
                pB.x * 1.017,
                pB.y * 1.017,
                pB.z * 1.017,
              ],
              3,
            ),
          );
          const endMat = new THREE.PointsMaterial({
            color: 0xffffff,
            size: 20,
            sizeAttenuation: false,
            transparent: true,
            opacity: 0,
            depthWrite: false,
            depthTest: false,
            blending: THREE.AdditiveBlending,
          });
          // we'll replace PointsMaterial with a custom one for soft circle:
          endMat.onBeforeCompile = (s) => {
            s.fragmentShader = s.fragmentShader.replace(
              "#include <premultiplied_alpha_fragment>",
              `
          vec2 uv = gl_PointCoord - 0.5;
          float d = length(uv);
          float soft = smoothstep(0.5, 0.0, d);
          gl_FragColor.a *= soft;
          #include <premultiplied_alpha_fragment>
        `,
            );
          };
          this.endpoints = new THREE.Points(endGeo, endMat);
          this.endpoints.renderOrder = 5;
        }
        update(dt) {
          this.life += dt;
          const t = this.life / this.total;
          if (t >= 1) return false;
          const draw = Math.min(1, t * 2.4);
          this.line.geometry.setDrawRange(0, Math.floor(draw * this.count));
          let op;
          if (t < 0.3) op = t / 0.3;
          else if (t < 0.7) op = 1;
          else op = 1 - (t - 0.7) / 0.3;
          this.line.material.opacity = op * 0.72;
          this.endpoints.material.opacity = op * 0.9;
          return true;
        }
        dispose() {
          this.line.geometry.dispose();
          this.line.material.dispose();
          this.endpoints.geometry.dispose();
          this.endpoints.material.dispose();
        }
      }

      const arcs = [];
      let spawnTimer = 0;
      function updateArcs(dt) {
        spawnTimer -= dt;
        if (
          spawnTimer <= 0 &&
          arcs.length < CFG.arcMax &&
          officePositions.length > 0
        ) {
          spawnTimer = CFG.arcSpawnMin + Math.random() * CFG.arcSpawnRand;
          const i1 = Math.floor(Math.random() * officePositions.length);
          let i2 = Math.floor(Math.random() * officePositions.length);
          let tries = 0;
          while (
            i2 === i1 ||
            officePositions[i1].distanceTo(officePositions[i2]) < 0.25
          ) {
            i2 = Math.floor(Math.random() * officePositions.length);
            if (++tries > 10) break;
          }
          const arc = new Arc(officePositions[i1], officePositions[i2]);
          globeGroup.add(arc.line);
          globeGroup.add(arc.endpoints);
          arcs.push(arc);
        }
        for (let i = arcs.length - 1; i >= 0; i--) {
          if (!arcs[i].update(dt)) {
            globeGroup.remove(arcs[i].line);
            globeGroup.remove(arcs[i].endpoints);
            arcs[i].dispose();
            arcs.splice(i, 1);
          }
        }
      }

      // ═════════════════════════════════════════════════════════════════════
      // Rim glow — atmospheric halo
      // ═════════════════════════════════════════════════════════════════════
      function buildRim() {
        const geo = new THREE.SphereGeometry(
          R * 1.065,
          CFG.rimSegs,
          CFG.rimSegs,
        );
        const mat = new THREE.ShaderMaterial({
          transparent: true,
          depthWrite: false,
          side: THREE.BackSide,
          blending: THREE.AdditiveBlending,
          vertexShader: `
      varying vec3 vN;
      varying vec3 vV;
      void main() {
        vN = normalize(normalMatrix * normal);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        vV = normalize(-mv.xyz);
        gl_Position = projectionMatrix * mv;
      }
    `,
          fragmentShader: `
      varying vec3 vN;
      varying vec3 vV;
      void main() {
        float rim = 1.0 - abs(dot(normalize(vN), normalize(vV)));
        rim = pow(rim, 2.6);
        gl_FragColor = vec4(0.78, 0.88, 1.0, rim * 0.4);
      }
    `,
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.renderOrder = 0;
        scene.add(mesh);
      }

      // ═════════════════════════════════════════════════════════════════════
      // Boot
      // ═════════════════════════════════════════════════════════════════════
      buildRim();
      buildInnerGlobe();
      buildWireframe();
      buildOffices();

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.onload = () => {
        // Share one offscreen canvas between the dot sampler and the tint
        // sphere texture — halves the drawImage + ImageData allocation cost.
        const shared = createLandMaskCanvas(img);
        buildLandPoints(sampleLandPositions(shared));
        buildLandTintSphere(shared);
      };
      img.onerror = () => {
        const positions = [];
        const N = Math.min(10000, CFG.fibN),
          phi = (1 + Math.sqrt(5)) / 2;
        for (let i = 0; i < N; i++) {
          const t = (i + 0.5) / N;
          const inc = Math.acos(1 - 2 * t);
          const az = (2 * Math.PI * i) / phi;
          positions.push(
            Math.sin(inc) * Math.cos(az),
            Math.cos(inc),
            Math.sin(inc) * Math.sin(az),
          );
        }
        buildLandPoints(positions);
      };
      // earth-water.png is a binary land/water mask (black=land, white=water)
      // — much sharper coastlines than the bump/topology image we used before,
      // which lost low-elevation coastal land (Korea, India, Europe, Indonesia).
      img.src = "https://unpkg.com/three-globe/example/img/earth-water.png";

      // ═════════════════════════════════════════════════════════════════════
      // Visibility gating — pause the render loop when the canvas is offscreen
      // (LP scroll) or the tab is backgrounded. Biggest mobile battery saver.
      // ═════════════════════════════════════════════════════════════════════
      let inViewport = true;
      let tabActive = !document.hidden;
      if ("IntersectionObserver" in window) {
        new IntersectionObserver(
          (entries) => {
            inViewport = entries[0].isIntersecting;
          },
          { threshold: 0 },
        ).observe(mount);
      }
      document.addEventListener("visibilitychange", () => {
        tabActive = !document.hidden;
      });

      // ═════════════════════════════════════════════════════════════════════
      // Animate — rAF with optional FPS cap on mobile
      // ═════════════════════════════════════════════════════════════════════
      const CLOCK = new THREE.Clock();
      const FRAME_MIN = CFG.targetFps >= 60 ? 0 : 1000 / CFG.targetFps - 1;
      let lastFrame = 0;
      function animate(now) {
        requestAnimationFrame(animate);
        if (!inViewport || !tabActive) {
          // Keep clock paused by consuming delta so first resumed frame is smooth
          CLOCK.getDelta();
          return;
        }
        if (FRAME_MIN > 0 && now - lastFrame < FRAME_MIN) return;
        lastFrame = now || 0;

        const dt = Math.min(0.05, CLOCK.getDelta());
        if (officeMat) officeMat.uniforms.uTime.value = CLOCK.elapsedTime;
        if (!userInteracting) globeGroup.rotation.y += dt * 0.07;
        updateArcs(dt);
        controls.update();
        renderer.render(scene, camera);
      }
      animate(0);
    </script>
